<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Signal TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .signal-card { background: #1e293b; border-left: 4px solid #10b981; }
        .SELL { border-left-color: #ef4444; }
    </style>
</head>
<body class="p-4">
    <header class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-bold text-green-400">🚀 Pro Signals</h1>
        <span id="status" class="text-xs bg-green-900 text-green-300 px-2 py-1 rounded">Live</span>
    </header>

    <div id="signal-container" class="space-y-4">
        <p class="text-center text-gray-400">Fetching live signals...</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function fetchSignals() {
            try {
                // তোর API থেকে ডাটা নিবে
                const response = await fetch('http://localhost:5000/api/signals');
                const result = await response.json();
                const container = document.getElementById('signal-container');
                container.innerHTML = '';

                result.data.forEach(sig => {
                    const card = document.createElement('div');
                    card.className = `signal-card p-4 rounded-lg shadow-lg ${sig.signal}`;
                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-lg">${sig.symbol}</h3>
                                <p class="text-xs text-gray-400">${sig.timestamp}</p>
                            </div>
                            <span class="px-2 py-1 rounded text-xs font-bold ${sig.signal === 'BUY' ? 'bg-green-500' : 'bg-red-500'}">${sig.signal}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-3 text-sm">
                            <div class="text-gray-400">Entry: <span class="text-white font-mono">${sig.entry}</span></div>
                            <div class="text-gray-400">TP: <span class="text-green-400 font-mono">${sig.tp1}</span></div>
                            <div class="text-gray-400">Confidence: <span class="text-blue-300">${sig.confidence}</span></div>
                            <div class="text-gray-400">Timeframe: <span class="text-white">${sig.timeframe}</span></div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                document.getElementById('signal-container').innerHTML = '<p class="text-red-400 text-center">API Not Connected</p>';
            }
        }

        setInterval(fetchSignals, 5000);
        fetchSignals();
    </script>
</body>
</html>
